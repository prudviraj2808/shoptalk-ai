services:
  # --- Postgres Database with pgvector ---
  db:
    image: pgvector/pgvector:pg16
    container_name: shoptalk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shoptalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shoptalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ShopTalk AI FastAPI App ---
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shoptalk-app
    restart: unless-stopped
    # Pointing to main:app because main.py is in your root directory
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app  # Maps entire root (including tools, agents, model) into the container
    depends_on:
      db:
        condition: service_healthy

  # --- ADK Development UI ---
  adk-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shoptalk-adk-ui
    restart: unless-stopped
    # Limited to the agents/ folder as requested
    command: ["uv", "run", "adk", "web", "--host", "0.0.0.0", "--port", "5000", "agents/"]
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app # Needs root access to import tools/product_search.py
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: