services:
  db:
    image: pgvector/pgvector:pg16
    container_name: shoptalk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shoptalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shoptalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  shoptalk:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shoptalk-app
    restart: unless-stopped
    # Executes our combined script
    command: ["/bin/bash", "./start.sh"]
    ports:
      - "8000:8000" # FastAPI
      - "5000:5000" # ADK UI
    env_file:
      - .env
    environment:
      # Double-reinforces the path for the Python interpreter
      - PYTHONPATH=/app
    volumes:
      - .:/app
      # overwriting the Linux .venv inside the container
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: