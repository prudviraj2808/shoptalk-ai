services:
  db:
    image: pgvector/pgvector:pg16
    container_name: shoptalk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # ✅ Never hardcode — set in .env
      POSTGRES_DB: shoptalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d shoptalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  shoptalk:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shoptalk-app
    restart: unless-stopped
    command: ["./start.sh"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-user}:${DB_PASSWORD}@db:5432/shoptalk
    volumes:
      # ✅ Only mount data dirs — never mount .:/app in production
      # It overwrites the built image and breaks the installed venv
      - ./abo_data:/app/abo_data
      - ./models:/app/models
      - ./vector-index:/app/vector-index
      - /app/.venv    # Protect the internal Linux venv
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: