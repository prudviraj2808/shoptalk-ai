services:
  db:
    image: pgvector/pgvector:pg16
    container_name: shoptalk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shoptalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shoptalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  shoptalk:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shoptalk-app
    restart: unless-stopped
    # Use the script we fixed
    command: ["./start.sh"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - BASE_URL=http://localhost:8000
      # Ensure the app knows where the DB is
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/shoptalk
    volumes:
      - .:/app
      - /app/.venv    # ✅ CRITICAL: This protects the internal Linux venv
      - ./data:/data 
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: